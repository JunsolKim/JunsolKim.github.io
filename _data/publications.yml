# ---------------------------------------------------------------------------
# All publications. Edit THIS FILE when adding/removing a paper — it's the
# single source of truth. The publications page, research-theme pages, and
# the homepage "Publications" list all read from here.
#
# Fields per publication:
#   id:           unique slug (letters, digits, hyphens). Used to reference
#                 papers from _data/featured.yml, _data/homepage_publications.yml,
#                 and _data/themes.yml. If you rename an id, update references.
#
#   title:        plain text title.
#
#   url:          link to paper (optional; omit if no online version yet).
#
#   authors:      HTML string. Wrap your own name in <em>...</em>. Put * after
#                 a name to mark equal contribution.
#
#   venue:        FULL venue (used on the Publications page).
#                 E.g. "International Conference on Learning Representations (ICLR)".
#
#   venue_short:  SHORT venue (used on the homepage list and Research page).
#                 Optional — falls back to `venue` if not set.
#                 E.g. "ICLR" or "Working paper · with Google, ..."
#
#   badge:        Optional small badge appended after venue.
#                 E.g. "Oral &middot; Top 1.8%".
#
#   year:         Display string for the left column.
#                 E.g. "2025", "Under review", "Working paper".
#                 You can insert an explicit line break with <br>
#                 (e.g. "Under<br>review") if you want a two-line layout.
#
#   category:     One of `peer_reviewed`, `under_review`, `working_paper`.
#                 Used to split the Publications page into sections.
#
#   shelf:        Optional. If present, this paper can appear in the homepage
#                 "Featured" shelf (actual display order is in _data/featured.yml).
#     image:         thumbnail path (e.g. assets/img/papers/iclr.jpg).
#     venue_short:   short venue label shown in the shelf card.
#     year_short:    short year label shown in the shelf card.
# ---------------------------------------------------------------------------

